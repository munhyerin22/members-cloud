spring:
  config:
    import: "aws-parameterstore:/cloud-project-app/prod/"
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
#      ddl-auto: none
  cloud:
    aws:
      s3:
        bucket: ${BUCKETNAME}

management:
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: true

info:
  app:
    message: ${APP_MESSAGE}

logging:
  level:
    root: INFO